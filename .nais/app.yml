apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oppgavestyring
  namespace: aap
  labels:
    team: aap
  annotations:
    kafka.nais.io/removeDataWhenResourceIsDeleted: {{kafka.permanent-delete-topics}}
    githubUrl: "https://github.com/navikt/aap-oppgavestyring"
    format: "json"
spec:
  image: {{image}}
  secureLogs:
    enabled: true
  accessPolicy:
    inbound:
      rules:
        - application: soknad-behandling
  azure:
    application:
      enabled: true
      allowAllUsers: true
      claims:
        extra:
          - NAVident
        groups:
        {{#each roles.group as |group|}}
           - id: "{{group}}"
        {{/each}}
  kafka:
    pool: {{kafka.pool}}
    streams: true
  gcp:
    sqlInstances:
      - type: POSTGRES_14
        databases:
          - name: oppgavestyring
            envVarPrefix: DB
  replicas:
    cpuThresholdPercentage: 90
    disableAutoScaling: true
    max: 1
    min: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  liveness:
    path: /actuator/live
    initialDelay: 3
    periodSeconds: 3
    failureThreshold: 21
  readiness:
    path: /actuator/ready
    initialDelay: 3
    periodSeconds: 3
    failureThreshold: 21
  prometheus:
    enabled: true
    path: /actuator/metrics

  env:
  {{#each roles as |role|}}
    - name: "{{role.name}}"
      value: "{{role.group}}"
  {{/each}}
